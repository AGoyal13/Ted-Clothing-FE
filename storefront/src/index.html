<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ted Clothing</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Ted Clothing — Quiet luxury Indian D2C clothing brand. Handcrafted premium apparel for men, women, and kids.">
  <meta property="og:title" content="Ted Clothing — Quiet Luxury">
  <meta property="og:description" content="Premium handcrafted Indian clothing. New arrivals every Friday.">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    (function() {
      try {
        var t = localStorage.getItem('ted_theme');
        var theme = (t === 'ivory' || t === 'parchment') ? t : 'parchment';
        document.documentElement.setAttribute('data-theme', theme);
      } catch(e) {
        document.documentElement.setAttribute('data-theme', 'parchment');
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>

</body>
</html>
