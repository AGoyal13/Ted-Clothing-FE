<main>
  <app-hero />

  @defer (on viewport) {
    <app-marquee />
  } @placeholder {
    <div style="height:44px;background:var(--gold);"></div>
  }

  <app-category-grid />

  <app-featured-products />

  @defer (on viewport) {
    <app-promo-banners />
  } @placeholder {
    <div style="height:300px;"></div>
  }

  @defer (hydrate on viewport) {
    <app-testimonials />
  }

  @defer (on viewport) {
    <app-feedback-form />
  } @placeholder {
    <div style="height:320px;"></div>
  }

  @defer (on viewport) {
    <app-newsletter />
  } @placeholder {
    <div style="height:300px;"></div>
  }
</main>
